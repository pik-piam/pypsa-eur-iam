# A cluster profile for the PIK HPC

executor: cluster-generic
jobs: 100

# Use partition standard and qos short if not set
cluster-generic-submit-cmd:
  export HPC_PARTITION=${{HPC_PARTITION:-priority}} HPC_QOS=${{HPC_QOS:-standby}} &&
  SCENARIO=$(echo "{wildcards}" | grep -oP '(?<=scen_REMIND=)[^, ]+'); SCENARIO=${{SCENARIO:-prepare}} &&
  mkdir -p logs_slurm/$SCENARIO/{rule} &&
  sbatch
    --partition=$HPC_PARTITION
    --qos=$HPC_QOS
    --cpus-per-task={threads}
    --mem={resources.mem_mb}
    --time={resources.runtime}
    --job-name=smk-{rule}-{wildcards}
    --output=logs_slurm/$SCENARIO/{rule}/{rule}-{wildcards}-%j.out
    --parsable
    --export=PATH,LD_LIBRARY_PATH,GUROBI_HOME,GRB_LICENSE_FILE
    --exclude=csp14c01
cluster-generic-cancel-cmd: scancel
cluster-generic-status-cmd: "python pik_hpc_profile/slurm-status.py"

# Allow canceling of snakemake-submitted slurm jobs using Ctrl+c in combination with sbatch --parsable
keep-going: true
keep-incomplete: true
latency-wait: 60
local-cores: 1
max-jobs-per-second: 15
max-status-checks-per-second: 15
printshellcmds: true
rerun-incomplete: true
# Omit the default `mtime` trigger so retrieve_* rules don't rerun and hit the internet from offline compute nodes.
rerun-triggers:
- code
- input
- params
# Tell the cached-http storage plugin not to query data.pypsa.org for file metadata.
# Safe because all PyPSA-Eur remote data is pinned to versioned URLs (e.g. powerplants/0.8.1/).
storage-cached-http-skip-remote-checks: true
restart-times: 2
# Disable snakemake lock
nolock: true
scheduler: greedy

# now define the resources
default-resources:
  - mem_mb=1000
  - runtime=20min  # fallback for rules that don't set their own runtime
