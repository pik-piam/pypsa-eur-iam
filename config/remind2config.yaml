enable_heat_pumps:
  remind_switch: c32_pypsa_cfg_heating
  overwrite_pypsa: remind_coupling.sector_coupling.heat_pumps.enable
  switch_mapping:
    0: false
    1: true
    2: true

enable_heat_pumps_dsm:
  remind_switch: c32_pypsa_cfg_heating
  overwrite_pypsa: remind_coupling.sector_coupling.heat_pumps.dsm
  switch_mapping:
    0: false
    1: false
    2: true

enable_resistive:
  remind_switch: c32_pypsa_cfg_heating
  overwrite_pypsa: remind_coupling.sector_coupling.resistive.enable
  switch_mapping:
    0: false
    1: true
    2: true

enable_resistive_dsm:
  remind_switch: c32_pypsa_cfg_heating
  overwrite_pypsa: remind_coupling.sector_coupling.resistive.dsm
  switch_mapping:
    0: false
    1: false
    2: true

# Calculate perturbed scenarios (to numerically determine partial derivative)
enable_perturbed_scenarios:
  remind_switch: c32_pypsa_cfg_perturb
  overwrite_pypsa: remind_coupling.solve_perturbed_network.enable
  switch_mapping:
    0: false
    1: true

# If solving perturbed networks, also create default op network 
enable_dispatch_networks_when_perturbed:
  remind_switch: c32_pypsa_cfg_perturb
  overwrite_pypsa: remind_coupling.solve_operations_network.enable
  switch_mapping:
    0: false
    1: true

# If solving perturbed networks, use default op network for export
use_dispatch_networks_for_export:
  remind_switch: c32_pypsa_cfg_perturb
  overwrite_pypsa: remind_coupling.export_to_REMIND.use_operations_network
  switch_mapping:
    0: false
    1: true
